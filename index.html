<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张洋的太空冒险 - Space Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .game-container {
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255,255,255,0.5); }
            to { text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.6); }
        }
        
        #gameCanvas {
            border: 3px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            background: #000;
        }
        
        .score-board {
            margin: 20px 0;
            font-size: 1.5em;
        }
        
        .score {
            color: #ffd700;
            font-weight: bold;
            font-size: 2em;
        }
        
        .controls {
            margin-top: 20px;
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="game-container">
        <h1>🚀 张洋的太空冒险 🚀</h1>
        
        <div class="score-board">
            得分: <span class="score" id="score">0</span>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <p>使用 ← → 方向键移动飞船，躲避陨石，收集星星！</p>
            <button class="btn" onclick="startGame()">开始游戏</button>
            <button class="btn" onclick="pauseGame()">暂停</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let animationId;
        
        // 游戏对象
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 80,
            width: 50,
            height: 60,
            speed: 8,
            color: '#4ecdc4'
        };
        
        let meteors = [];
        let stars = [];
        let particles = [];
        
        // 键盘控制
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // 创建背景星星
        function createBackgroundStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // 绘制飞船
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // 飞船主体
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(0, -player.height/2);
            ctx.lineTo(-player.width/2, player.height/2);
            ctx.lineTo(0, player.height/2 - 10);
            ctx.lineTo(player.width/2, player.height/2);
            ctx.closePath();
            ctx.fill();
            
            // 飞船窗口
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, -10, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // 引擎火焰
            if (gameRunning && !gamePaused) {
                ctx.fillStyle = '#ff6b35';
                ctx.beginPath();
                ctx.moveTo(-10, player.height/2 - 5);
                ctx.lineTo(0, player.height/2 + 15 + Math.random() * 10);
                ctx.lineTo(10, player.height/2 - 5);
                ctx.closePath();
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        // 创建陨石
        function createMeteor() {
            meteors.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: -40,
                width: 30 + Math.random() * 30,
                height: 30 + Math.random() * 30,
                speed: 3 + Math.random() * 3,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.1
            });
        }
        
        // 绘制陨石
        function drawMeteors() {
            ctx.fillStyle = '#8b7355';
            meteors.forEach(meteor => {
                ctx.save();
                ctx.translate(meteor.x, meteor.y);
                ctx.rotate(meteor.rotation);
                
                // 陨石主体
                ctx.beginPath();
                const sides = 6;
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2;
                    const radius = meteor.width / 2 * (0.8 + Math.random() * 0.4);
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                
                // 陨石纹理
                ctx.fillStyle = '#6b5344';
                ctx.beginPath();
                ctx.arc(-5, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });
        }
        
        // 创建星星
        function createStar() {
            stars.push({
                x: Math.random() * (canvas.width - 20) + 10,
                y: -20,
                size: 15,
                speed: 2 + Math.random() * 2
            });
        }
        
        // 绘制星星
        function drawStars() {
            stars.forEach(star => {
                ctx.save();
                ctx.translate(star.x, star.y);
                
                // 星星光芒
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * star.size;
                    const y = Math.sin(angle) * star.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    
                    const innerAngle = ((i + 0.5) / 5) * Math.PI * 2 - Math.PI / 2;
                    const innerX = Math.cos(innerAngle) * (star.size / 2);
                    const innerY = Math.sin(innerAngle) * (star.size / 2);
                    ctx.lineTo(innerX, innerY);
                }
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            });
        }
        
        // 创建粒子效果
        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color: color
                });
            }
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach((p, index) => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }
        
        // 更新游戏状态
        function update() {
            if (!gameRunning || gamePaused) return;
            
            // 玩家移动
            if (keys['ArrowLeft'] && player.x > player.width/2) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width/2) {
                player.x += player.speed;
            }
            
            // 更新陨石
            meteors.forEach((meteor, index) => {
                meteor.y += meteor.speed;
                meteor.rotation += meteor.rotationSpeed;
                
                // 碰撞检测
                if (meteor.y + meteor.height/2 > player.y - player.height/2 &&
                    meteor.y - meteor.height/2 < player.y + player.height/2 &&
                    meteor.x + meteor.width/2 > player.x - player.width/2 &&
                    meteor.x - meteor.width/2 < player.x + player.width/2) {
                    gameOver();
                }
                
                // 移除超出屏幕的陨石
                if (meteor.y > canvas.height + 50) {
                    meteors.splice(index, 1);
                    score += 10;
                    updateScore();
                }
            });
            
            // 更新星星
            stars.forEach((star, index) => {
                star.y += star.speed;
                
                // 收集检测
                if (star.y + star.size > player.y - player.height/2 &&
                    star.y - star.size < player.y + player.height/2 &&
                    star.x + star.size > player.x - player.width/2 &&
                    star.x - star.size < player.x + player.width/2) {
                    createParticles(star.x, star.y, '#ffd700');
                    stars.splice(index, 1);
                    score += 50;
                    updateScore();
                }
                
                // 移除超出屏幕的星星
                if (star.y > canvas.height + 50) {
                    stars.splice(index, 1);
                }
            });
            
            // 生成新对象
            if (Math.random() < 0.02) createMeteor();
            if (Math.random() < 0.01) createStar();
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景星星
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73) % canvas.width;
                const y = (i * 37 + Date.now() * 0.02) % canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.fill();
            }
            
            drawStars();
            drawMeteors();
            drawPlayer();
            drawParticles();
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // 更新分数显示
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            
            gameRunning = true;
            gamePaused = false;
            score = 0;
            meteors = [];
            stars = [];
            particles = [];
            player.x = canvas.width / 2;
            updateScore();
            gameLoop();
        }
        
        // 暂停游戏
        function pauseGame() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width/2, canvas.height/2 - 50);
            
            ctx.font = '32px Arial';
            ctx.fillText('最终得分: ' + score, canvas.width/2, canvas.height/2 + 20);
            
            ctx.font = '24px Arial';
            ctx.fillText('点击"开始游戏"重新开始', canvas.width/2, canvas.height/2 + 80);
        }
        
        // 初始化
        createBackgroundStars();
        draw();
    </script>
</body>
</html>
